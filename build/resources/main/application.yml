spring:
    config:
        import: "optional:file:./.env[.properties]"

    application:
        name: ManaProject

    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        open-in-view: false
        properties:
            hibernate:
                format_sql: true

app:
    jwt:
        secret: ${JWT_SECRET}
        expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}